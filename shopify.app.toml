# This file stores configurations for your Shopify app.

client_id = "985cb594ba588725d9af8366c25587ae"
name = "tattup-ai"
application_url = "https://example.com"
embedded = true

[webhooks]
api_version = "2026-04"

  # Handled by: /app/routes/webhooks.app.uninstalled.tsx
  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = ["app/uninstalled"]

  # Handled by: /app/routes/webhooks.app.scopes_update.tsx
  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  # Handled by: /app/routes/webhooks.orders.paid.tsx
  # Grants credits when customer purchases the credit-packages product
  [[webhooks.subscriptions]]
  topics = ["orders/paid"]
  uri = "/webhooks/orders/paid"


[access_scopes]
scopes = "write_products,read_customers,write_customers,read_files,write_files,read_metaobject_definitions,write_metaobject_definitions,read_metaobjects,write_metaobjects,read_orders"


[auth]
redirect_urls = [ "https://example.com/api/auth" ]

[build]
automatically_update_urls_on_dev = true